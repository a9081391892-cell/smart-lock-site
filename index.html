<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Умные замки — Face ID, код, отпечаток, телефон</title>
    <meta name="description" content="Подбор и продажа умных замков для квартиры, офиса, аренды, калитки и частного дома. Есть модели с Face ID, удалённым доступом и защитой для улицы." />
    <style>
      :root {
        --bg: #020617;
        --panel: rgba(255,255,255,0.05);
        --panel-2: rgba(255,255,255,0.08);
        --text: #fff;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --accent-2: #f59e0b;
        --border: rgba(255,255,255,0.10);
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(34,211,238,.12), transparent 28%),
          radial-gradient(circle at left, rgba(16,185,129,.10), transparent 24%),
          var(--bg);
        color: var(--text);
      }
      a { color: inherit; text-decoration: none; }
      .container { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
      .hero, .section { padding: 72px 0; }
      .hero-grid, .two-col, .faq-grid { display: grid; gap: 28px; }
      .hero-grid { grid-template-columns: 1.15fr .85fr; align-items: center; }
      .two-col { grid-template-columns: 1fr 1fr; }
      .tag {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 10px 14px; border-radius: 999px;
        background: rgba(34,211,238,.12); border: 1px solid rgba(34,211,238,.28);
        color: #a5f3fc; font-size: 14px;
      }
      h1 { font-size: clamp(38px, 6vw, 64px); line-height: 1.05; margin: 18px 0; }
      h2 { font-size: clamp(30px, 4vw, 42px); margin: 0 0 12px; }
      h3 { font-size: 24px; margin: 0 0 8px; }
      p { color: var(--muted); line-height: 1.6; margin: 0; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 14px 20px; border-radius: 18px; font-weight: 700;
        border: 1px solid var(--border); transition: .2s ease;
      }
      .btn:hover { transform: translateY(-1px); }
      .btn-primary { background: #fff; color: #0f172a; }
      .btn-secondary { background: rgba(255,255,255,.05); color: #fff; }
      .stats, .product-grid, .feature-list, .faq-list { display: grid; gap: 16px; }
      .stats { grid-template-columns: repeat(2, minmax(0,1fr)); margin-top: 28px; }
      .card, .hero-card, .form-card, .faq-item {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 28px;
        box-shadow: 0 20px 40px rgba(0,0,0,.18);
        backdrop-filter: blur(10px);
      }
      .stat-card { padding: 18px; }
      .hero-card { padding: 22px; }
      .hero-mock {
        border-radius: 24px; border: 1px solid var(--border); background: #0f172a; padding: 24px;
      }
      .mock-image {
        height: 220px; border-radius: 22px; border: 1px dashed rgba(34,211,238,.28);
        background: linear-gradient(135deg, #111827, #0f172a);
        display: flex; align-items: center; justify-content: center; text-align: center;
        color: #e2e8f0; font-size: 24px; font-weight: 700; padding: 16px;
      }
      .chip-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
      .chip {
        padding: 9px 12px; border-radius: 999px; background: rgba(255,255,255,.07);
        font-size: 14px; color: #e2e8f0;
      }
      .section-head { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 28px; }
      .product-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .product-card { padding: 20px; }
      .topline { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 14px; }
      .badge {
        display: inline-flex; align-items: center; padding: 8px 12px; border-radius: 999px;
        font-size: 14px; background: rgba(34,211,238,.12); color: #a5f3fc;
      }
      .badge.face { background: rgba(245,158,11,.14); color: #fde68a; }
      .price { font-size: 16px; font-weight: 800; color: #e2e8f0; }
      .product-name-box {
        min-height: 170px; display: flex; align-items: center; justify-content: center;
        border-radius: 22px; border: 1px dashed var(--border); background: #0f172a;
        text-align: center; padding: 20px; font-size: 28px; font-weight: 800; margin-bottom: 14px;
      }
      .feature-list { grid-template-columns: repeat(2, minmax(0,1fr)); margin-top: 16px; }
      .feature-pill {
        padding: 10px 12px; border-radius: 999px; background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.08); text-align: center; font-size: 14px; color: #dbeafe;
      }
      .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
      .strip { border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: rgba(255,255,255,.03); }
      .feature-item { padding: 18px; border-radius: 22px; background: rgba(15,23,42,.75); border: 1px solid var(--border); }
      .form-card { padding: 24px; }
      .form-grid { display: grid; gap: 12px; margin-top: 20px; }
      input, textarea {
        width: 100%; padding: 14px 16px; border-radius: 18px; border: 1px solid var(--border);
        background: rgba(255,255,255,.05); color: white; outline: none; font: inherit;
      }
      textarea { min-height: 120px; resize: vertical; }
      .faq-list { margin-top: 24px; }
      .faq-item { padding: 20px; }
      footer { border-top: 1px solid var(--border); padding: 28px 0; }
      .footer-row { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
      .small { font-size: 14px; color: var(--muted); }
      @media (max-width: 980px) {
        .hero-grid, .two-col, .product-grid { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 760px) {
        .hero, .section { padding: 54px 0; }
        .hero-grid, .two-col, .product-grid, .stats, .feature-list, .card-actions { grid-template-columns: 1fr; }
        .section-head, .footer-row { display: block; }
        .footer-row > div + div { margin-top: 12px; }
        .product-name-box { min-height: 130px; font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
